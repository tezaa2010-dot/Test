<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านไอดี One Piece</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── LIGHT THEME (default) ── */
:root {
  --bg: #f5f7ff;
  --white: #ffffff;
  --border: #e5e8f0;
  --border2: #cdd1e0;
  --text: #111827;
  --text2: #374151;
  --muted: #9ca3af;
  --accent: #6366f1;
  --accent-h: #4f46e5;
  --accent-light: #eef2ff;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --blue: #2563eb;
  --blue-bg: #dbeafe;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --purple: #7c3aed;
  --purple-bg: #ede9fe;
  --gray: #6b7280;
  --gray-bg: #f3f4f6;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
  --card-sell-bg:#f0fbf7;--card-sell-bd:#a8e6d4;
  --card-keep-bg:#fffbf0;--card-keep-bd:#f5d97a;
  --card-web-bg:#f0f7ff; --card-web-bd:#bdd7f5;
  --card-sold-bg:#f8f8fb;--card-sold-bd:#e5e8f0;
  --card-sending-bg:#fff7ed;--card-sending-bd:#fdba74;
  --orange:#ea580c;--orange-bg:#ffedd5;
}
/* ── DARK THEME ── */
[data-theme="dark"] {
  --bg: #0f1117;
  --white: #1a1d27;
  --border: #2a2d3a;
  --border2: #3a3d4e;
  --text: #e8eaf0;
  --text2: #b0b4c4;
  --muted: #555870;
  --accent: #818cf8;
  --accent-h: #6366f1;
  --accent-light: #1e2035;
  --green: #4ade80;
  --green-bg: #052e16;
  --blue: #60a5fa;
  --blue-bg: #0c1a3a;
  --amber: #fbbf24;
  --amber-bg: #2d1a00;
  --red: #f87171;
  --red-bg: #2d0a0a;
  --purple: #a78bfa;
  --purple-bg: #1e1035;
  --gray: #9ca3af;
  --gray-bg: #1e2030;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow: 0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 6px rgba(0,0,0,.4);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.5);
  --card-sell-bg:#061a10;--card-sell-bd:#1a4a2e;
  --card-keep-bg:#1a1200;--card-keep-bd:#4a3a00;
  --card-web-bg:#060f1a; --card-web-bd:#1a3050;
  --card-sold-bg:#12131a;--card-sold-bd:#2a2d3a;
  --card-sending-bg:#1f1200;--card-sending-bd:#7c3000;
  --orange:#fb923c;--orange-bg:#431407;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm);gap:10px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(99,102,241,.35)}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--muted);font-weight:500}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sdot.err{background:var(--red);animation:none}
.sdot.loading{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.dark-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0}
.dark-btn:hover{border-color:var(--border2);background:var(--white)}

/* NAV */
.nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto}
.nav-btn{padding:14px 18px;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{padding:20px;max-width:780px;margin:0 auto;width:100%}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-sm)}
.stat .lbl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.stat .val{font-size:24px;font-weight:700;letter-spacing:-.5px}
.val-green{color:var(--green)}.val-blue{color:var(--blue)}.val-amber{color:var(--amber)}.val-gray{color:var(--gray)}.val-purple{color:var(--purple)}

/* SEARCH */
.search-bar{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:0 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;box-shadow:var(--shadow-sm);transition:border-color .15s}
.search-bar:focus-within{border-color:var(--accent)}
.search-icon{color:var(--muted);font-size:15px;flex-shrink:0}
.search-input{flex:1;border:none;outline:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:transparent;padding:11px 0}
.search-input::placeholder{color:var(--muted)}

/* FILTER SECTION */
.filter-section{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--gray);transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.on-green{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.chip.on-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.chip.on-amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.chip.on-red{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.chip.on-purple{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}

/* STOCK TOOLBAR */
.stock-toolbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:12px}
.clear-sold-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--red);background:var(--red-bg);color:var(--red);transition:all .15s;font-family:'Inter',sans-serif}
.clear-sold-btn:hover{background:var(--red);color:#fff}

/* GROUP */
.group{margin-bottom:20px}
.group-header{display:flex;align-items:center;gap:10px;margin:20px 0 10px;padding:0 2px}
.group-label{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:-.1px}
.group-gem-icon{font-size:16px}
.group-count{font-size:12px;font-weight:600;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:20px}
.group-line{flex:1;height:1px;background:var(--border)}

/* NOTE INLINE */
.note-row{margin-top:6px;display:flex;align-items:center;gap:6px}
.note-input{flex:1;font-family:'Inter',sans-serif;font-size:12px;color:var(--text2);background:transparent;border:none;border-bottom:1px dashed var(--border2);outline:none;padding:2px 4px;transition:all .15s;min-width:0}
.note-input:focus{border-bottom-color:var(--accent);background:rgba(99,102,241,.04)}
.note-input::placeholder{color:var(--muted)}
.note-save-btn{font-size:11px;padding:2px 8px;border-radius:5px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap;display:none}
.note-save-btn.show{display:inline-block}
.note-save-btn:hover{background:var(--accent);color:#fff}

/* ID CARD */
.id-list{display:flex;flex-direction:column;gap:6px}
.id-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow-sm);transition:all .15s}
.id-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.id-card.status-keep{background:var(--card-keep-bg);border-color:var(--card-keep-bd);border-left:4px solid var(--amber)}
.id-card.status-web{background:var(--card-web-bg);border-color:var(--card-web-bd);border-left:4px solid var(--blue)}
.id-card.status-sell{background:var(--card-sell-bg);border-color:var(--card-sell-bd);border-left:4px solid var(--green)}
.id-card.status-sold{background:var(--card-sold-bg);border-color:var(--card-sold-bd);border-left:4px solid var(--muted);opacity:.55}
.id-card.status-sending{background:var(--card-sending-bg);border-color:var(--card-sending-bd);border-left:4px solid var(--orange)}
.id-info{flex:1;min-width:0}
.id-account{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.id-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.id-pw{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.id-note{font-size:11px;color:var(--amber);font-weight:500}
.gem{font-size:12px;color:var(--gray);font-weight:500}
.id-created{font-size:10px;color:var(--muted);margin-top:4px}

/* BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;letter-spacing:.2px}
.b-android{background:var(--green-bg);color:var(--green)}
.b-ios{background:var(--blue-bg);color:var(--blue)}
.b-sold{background:var(--gray-bg);color:var(--gray)}
.b-sending{background:var(--orange-bg);color:var(--orange)}

/* STATUS DROPDOWN */
.status-select{padding:4px 8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;outline:none;transition:border-color .15s}
.status-select:focus{border-color:var(--accent)}

/* ACTION BTNS */
.id-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.icon-btn{padding:6px 10px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
.icon-btn:hover.copy{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.icon-btn.copied{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.icon-btn:hover.edit{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.icon-btn:hover.del{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.sell-btn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--accent);background:var(--accent-light);color:var(--accent);transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.sell-btn:hover{background:var(--accent);color:#fff}
.sold-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:7px;background:var(--gray-bg);color:var(--gray)}
.sending-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:7px;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange);animation:sendpulse 1.5s infinite}
@keyframes sendpulse{0%,100%{opacity:1}50%{opacity:.6}}
.return-btn{padding:6px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.return-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px;font-weight:500}
.empty small{font-size:12px;margin-top:4px;display:block}

/* FORM */
.form-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--shadow-sm)}
.form-title{font-size:16px;font-weight:700;margin-bottom:20px;letter-spacing:-.3px}
.tab-toggle{display:flex;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:20px;width:fit-content}
.ttbtn{padding:6px 18px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.ttbtn.on{background:var(--white);color:var(--text);box-shadow:var(--shadow-sm)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fgrid.full{grid-template-columns:1fr}
.field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--white)}
.bulk-area{width:100%;min-height:110px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;resize:vertical;line-height:1.7;transition:border-color .15s}
.bulk-area:focus{border-color:var(--accent);background:var(--white)}
.parse-preview{margin-top:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.parse-row{display:grid;grid-template-columns:1fr 1fr auto;padding:7px 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;border-bottom:1px solid var(--border);align-items:center;gap:8px}
.parse-row:last-child{border-bottom:none}
.parse-count{font-size:12px;color:var(--muted);font-weight:500;margin:8px 0 4px}
.submit-btn{margin-top:16px;padding:10px 24px;border-radius:9px;background:var(--accent);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.submit-btn:hover{background:var(--accent-h)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* HISTORY */
.hist-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.hist-acc{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;margin-bottom:3px}
.hist-pw{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:2px}
.hist-time{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap}
.hist-price{font-size:13px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0}

/* COST SETTINGS */
.cost-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cost-row:last-child{border-bottom:none}
.cost-gem{font-size:13px;font-weight:600;color:var(--text);min-width:130px}
.cost-input-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:8px;background:var(--bg);overflow:hidden;transition:border-color .15s;flex:1;min-width:120px;max-width:180px}
.cost-input-wrap:focus-within{border-color:var(--accent)}
.cost-baht{padding:0 10px;font-size:13px;color:var(--muted);font-weight:500;background:transparent}
.cost-input{border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);padding:8px 8px 8px 0;width:100%}
.cost-save-btn{padding:7px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-light);color:var(--accent);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.cost-save-btn:hover{background:var(--accent);color:#fff}

/* PROFIT */
.profit-row{padding:14px 0;border-bottom:1px solid var(--border)}
.profit-row:last-child{border-bottom:none}
.profit-today{background:var(--accent-light);border-radius:10px;padding:14px 12px;margin:-2px -12px;border-bottom:none!important;margin-bottom:4px}
.profit-date{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.today-badge{font-size:10px;font-weight:600;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px}
.profit-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.profit-col{text-align:center}
.profit-lbl{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.profit-val{font-size:14px;font-weight:700;letter-spacing:-.3px}
.profit-val.blue{color:var(--blue)}.profit-val.amber{color:var(--amber)}.profit-val.green{color:var(--green)}.profit-val.red{color:var(--red)}.profit-val.gray{color:var(--gray)}
.val-red{color:var(--red)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:16px;padding:28px;max-width:400px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.modal p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--gray);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--border)}
.btn-confirm{padding:8px 20px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-confirm:hover{background:var(--accent-h)}
.btn-danger{padding:8px 20px;border-radius:9px;border:none;background:var(--red);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-danger:hover{opacity:.85}
.edit-modal{max-width:460px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#15803d}
.toast.error{background:var(--red)}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:14px">กำลังโหลด...</div>
</div>

<!-- SELL MODAL -->
<div class="modal-bg" id="modal-sell">
  <div class="modal">
    <h3>⚠️ ยืนยันการขาย</h3>
    <p id="modal-sell-text"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('sell')">ยกเลิก</button>

// ── DARK MODE ──

function updateDarkBtn(theme) {
  const btn = document.getElementById('dark-btn');
  if(btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
window.toggleDark = function() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);

};

// ── UTILS ──
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;

}
function setSyncStatus(state, msg) {

function fmtDate(ts) {

// ── RENDER SHELL ──

// ── STATS ──
function renderStats() {
  const avail   = ids.filter(x=>!['sold'].includes(x.status)).length;
  const sold    = ids.filter(x=>x.status==='sold').length;

      <div class="stat"><div class="lbl">พร้อมขาย</div><div class="val val-green">${avail}</div></div>
      <div class="stat"><div class="lbl">Sell</div><div class="val val-blue">${sell}</div></div>

      <div class="stat"><div class="lbl">ขายแล้ว</div><div class="val val-gray">${sold}</div></div>

// ── SEARCH ──
function renderSearch() {
  const el = document.getElementById('search-area');
  if(!el) return;
  el.innerHTML = `
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" placeholder="ค้นหา ไอดี, รหัสผ่าน, หมายเหตุ..." oninput="onSearch(this.value)">
    </div>`;
}
window.onSearch = function(v) { searchQ = v.toLowerCase(); renderFilters(); renderList(); };

// ── FILTERS ──
function renderFilters() {
  const el = document.getElementById('filter-area');
  if(!el) return;
  const sortOptions = [
    {val:'createdAt_desc', label:'ใหม่ → เก่า'},
    {val:'createdAt_asc',  label:'เก่า → ใหม่'},
    {val:'gem_desc',       label:'เพชร ↓'},
    {val:'gem_asc',        label:'เพชร ↑'},
  ];
  const gbOptions = [
    {val:'gem',  label:'แยกตามเพชร'},
    {val:'os',   label:'แยกตาม OS'},
    {val:'none', label:'ไม่แยก'},
  ];
  el.innerHTML = `
    <div class="filter-section">
      <div class="filter-row">
        <span class="filter-label">OS:</span>
        ${['all','Android','iOS'].map(v=>`
          <button class="chip ${filterOs===v?'on':''}" onclick="setF('os','${v}')">${v==='all'?'ทั้งหมด':v}</button>
        `).join('')}
        <span class="filter-label" style="margin-left:4px">สถานะ:</span>
        ${[
          {v:'all',l:'ทั้งหมด'},{v:'sell',l:'Sell'},{v:'keep',l:'Keep'},{v:'web',l:'Web'},{v:'sending',l:'🟠 กำลังส่ง'},{v:'sold',l:'ขายแล้ว'}
        ].map(({v,l})=>{
          let cls='';
          if(filterStatus===v) cls = v==='sell'?'on-green':v==='keep'?'on-amber':v==='web'?'on-blue':v==='sold'?'on-red':v==='sending'?'on-amber':'on';
          return `<button class="chip ${cls}" onclick="setF('status','${v}')">${l}</button>`;
        }).join('')}
      </div>
      <div class="filter-row">
        <span class="filter-label">จัดกลุ่ม:</span>
        ${gbOptions.map(o=>`<button class="chip ${groupBy===o.val?'on':''}" onclick="setGroup('${o.val}')">${o.label}</button>`).join('')}
        <span class="filter-label" style="margin-left:4px">เรียง:</span>
        ${sortOptions.map(o=>`<button class="chip ${sortBy===o.val?'on':''}" onclick="setSort('${o.val}')">${o.label}</button>`).join('')}
      </div>
    </div>`;
}
window.setF     = function(t,v){ if(t==='os') filterOs=v; else filterStatus=v; renderFilters(); renderList(); };
window.setGroup = function(v){ groupBy=v; renderFilters(); renderList(); };
window.setSort  = function(v){ sortBy=v;  renderFilters(); renderList(); };

// ── TOOLBAR ──
function renderToolbar() {
  const el = document.getElementById('toolbar-area');
  if(!el) return;
  const soldCount = ids.filter(x=>x.status==='sold').length;
  el.innerHTML = soldCount ? `
    <div class="stock-toolbar">
      <button class="clear-sold-btn" onclick="confirmClearSold()">🗑️ ล้างที่ขายแล้ว (${soldCount} รายการ)</button>
    </div>` : '';
}

// ── LIST ──
function getFiltered() {
  return ids.filter(x => {
    if(filterOs!=='all' && x.os!==filterOs) return false;
    if(filterStatus!=='all' && (x.status||'sell')!==filterStatus) return false;
    if(searchQ) {
      const hay = `${x.account} ${x.pw} ${x.note||''} ${x.gem}`.toLowerCase();
      if(!hay.includes(searchQ)) return false;
    }
    return true;
  });
}
function sortList(list) {
  return [...list].sort((a,b)=>{
    if(sortBy==='createdAt_desc') return (b.createdAt||0)-(a.createdAt||0);
    if(sortBy==='createdAt_asc')  return (a.createdAt||0)-(b.createdAt||0);
    if(sortBy==='gem_desc')       return (b.gem||0)-(a.gem||0);
    if(sortBy==='gem_asc')        return (a.gem||0)-(b.gem||0);
    return 0;
  });
}
function renderList() {
  const el = document.getElementById('id-list-area');
  if(!el) return;
  const list = sortList(getFiltered());
  if(!list.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>ไม่พบไอดีที่ตรงกัน</p><small>ลองเปลี่ยนตัวกรองหรือคำค้นหา</small></div>`;
    return;
  }
  if(groupBy==='none') { el.innerHTML=`<div class="id-list">${list.map(cardHTML).join('')}</div>`; return; }
  const groups = {};
  list.forEach(x => {
    const key = groupBy==='gem' ? `💎 ${(x.gem||0).toLocaleString()} เพชร` : (x.os||'Unknown');
    if(!groups[key]) groups[key]=[];
    groups[key].push(x);
  });
  const sortedKeys = Object.keys(groups).sort((a,b)=>{
    if(groupBy==='gem'){ const na=parseInt(a.replace(/\D/g,''))||0,nb=parseInt(b.replace(/\D/g,''))||0; return nb-na; }
    return a.localeCompare(b);
  });
  el.innerHTML = sortedKeys.map(key=>`
    <div class="group">
      <div class="group-header">
        <span class="group-gem-icon">${groupBy==='gem'?'💎':'📱'}</span>
        <span class="group-label">${key}</span>
        <span class="group-count">${groups[key].length} ไอดี</span>
        <div class="group-line"></div>
      </div>
      <div class="id-list">${groups[key].map(cardHTML).join('')}</div>
    </div>`).join('');
}

function cardHTML(x) {
  const status = x.status||'sell';
  const isSold = status==='sold';
  const noteVal = (x.note||'').replace(/"/g,'&quot;');
  const priceStr = x.price ? `<span style="font-size:11px;color:var(--amber);font-weight:600">฿${x.price}</span>` : '';
  const createdStr = x.createdAt ? `<div class="id-created">📅 เพิ่ม ${fmtDate(x.createdAt)}</div>` : '';
  return `
    <div class="id-card ${STATUS_CARD[status]||''}">
      <div class="id-info">
        <div class="id-account">${x.account}</div>
        <div class="id-meta">
          <span class="id-pw">${x.pw}</span>
          <span class="badge ${x.os==='Android'?'b-android':'b-ios'}">${x.os||''}</span>
          <span class="gem">💎 ${(x.gem||0).toLocaleString()}</span>
          ${priceStr}
        </div>
        ${!isSold?`
        <div class="note-row">
          <input class="note-input" id="note-${x.id}" value="${noteVal}" placeholder="เพิ่มหมายเหตุ..."
            oninput="onNoteInput('${x.id}')" onkeydown="if(event.key==='Enter') saveNote('${x.id}')">
          <button class="note-save-btn" id="note-btn-${x.id}" onclick="saveNote('${x.id}')">บันทึก</button>
        </div>`:x.note?`<div style="margin-top:5px;font-size:11px;color:var(--gray)">📝 ${x.note}</div>`:''}
        ${createdStr}
      </div>
      <div class="id-actions">
        ${isSold?`
          <span class="sold-badge">✓ ขายแล้ว</span>
          <button class="icon-btn del" onclick="confirmDelete('${x.id}')" title="ลบ">🗑️</button>
        `:status==='sending'?`
          <span class="sending-badge">📤 กำลังส่ง...</span>
          <button class="return-btn" onclick="returnStock('${x.id}')" title="คืนสต็อก">↩ คืน</button>
          <button class="sell-btn" onclick="confirmSell('${x.id}')">✅ ขายแล้ว</button>
        `:`
          <select class="status-select" onchange="changeStatus('${x.id}',this.value)">
            <option value="sell" ${status==='sell'?'selected':''}>Sell</option>
            <option value="keep" ${status==='keep'?'selected':''}>Keep</option>
            <option value="web"  ${status==='web' ?'selected':''}>Web</option>
          </select>
          <button class="icon-btn copy" onclick="copyID('${x.id}',this)" title="คัดลอก account:password">📋</button>
          <button class="icon-btn edit" onclick="openEdit('${x.id}')" title="แก้ไข">✏️</button>
          <button class="sell-btn" onclick="confirmSell('${x.id}')">ขายแล้ว</button>
        `}
      </div>
    </div>`;
}

// ── COPY — show confirmation first ──
let pendingCopyId = null;
let pendingCopyBtn = null;

window.copyID = function(idVal, btn) {
  const item = ids.find(x=>x.id===idVal);
  if(!item) return;
  pendingCopyId = idVal;
  pendingCopyBtn = btn;
  const osLabel = item.os || '';
  const gemLabel = (item.gem||0).toLocaleString();
  document.getElementById('modal-copy-text').innerHTML =
    `<strong>${item.account}</strong><br>` +
    `💎 <strong style="font-size:15px;color:var(--accent)">${gemLabel} เพชร</strong> · ${osLabel}` +
    `<br><br><span style="font-size:12px;color:var(--muted)">สิ่งที่จะถูกก็อป:</span><br>` +
    `<code style="font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--bg);padding:6px 10px;border-radius:6px;display:inline-block;margin-top:4px;line-height:1.6">` +
    `💎 ${gemLabel} เพชร<br>${item.account}:${item.pw}</code>`;
  document.getElementById('modal-copy').classList.add('show');
};

window.doCopy = async function() {
  if(!pendingCopyId) return;
  const item = ids.find(x=>x.id===pendingCopyId);
  if(!item) return;
  const gemLabel = (item.gem||0).toLocaleString();
  const copyText = `💎 ${gemLabel} เพชร\n${item.account}:${item.pw}`;
  try {
    await navigator.clipboard.writeText(copyText);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = copyText;
    ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  if(pendingCopyBtn) {
    pendingCopyBtn.textContent='✅'; pendingCopyBtn.classList.add('copied');
    setTimeout(()=>{ pendingCopyBtn.textContent='📋'; pendingCopyBtn.classList.remove('copied'); }, 1500);
  }
  if(item.status !== 'sending' && item.status !== 'sold') {
    await update(ref(db,'ids/'+pendingCopyId), {status:'sending'});
  }
  toast(`📋 ก็อปแล้ว — 💎 ${gemLabel} เพชร — สถานะเป็น "กำลังส่ง"`, 'success');
  closeModal('copy');
  pendingCopyId = null;
  pendingCopyBtn = null;
};

window.returnStock = async function(idVal) {
  if(!db) return;
  await update(ref(db,'ids/'+idVal), {status:'sell'});
  toast('↩ คืนสต็อกแล้ว', '');
};

// ── SELL ──
window.confirmSell = function(idVal) {
  const item = ids.find(x=>x.id===idVal);
  if(!item||item.status==='sold') return;
  pendingId = idVal;

// ── G2G CSV PARSE ──
function parseG2GCSVLine(line) {
  // Handle quoted fields with commas inside
  const fields = [];
  let cur = '', inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ fields.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  fields.push(cur.trim());
  return fields;
}

function parseG2GCSV(text) {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if(lines.length < 2) return [];
  // Parse header to find column indices
  const header = parseG2GCSVLine(lines[0]).map(h=>h.toLowerCase().replace(/['"]/g,'').trim());
  const accIdx = header.findIndex(h=>h==='account id');
  const pwIdx  = header.findIndex(h=>h==='password');
  if(accIdx===-1||pwIdx===-1) return [];
  const out = [];
  for(let i=1;i<lines.length;i++){
    const cols = parseG2GCSVLine(lines[i]);
    const acc = (cols[accIdx]||'').replace(/^'/,'').trim(); // remove leading apostrophe G2G adds
    const pw  = (cols[pwIdx] ||'').replace(/^'/,'').trim();
    if(acc && pw) out.push({account:acc, pw});
  }
  return out;
}

function getTsDateKey(ts, mode) {
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');

}

function fmtMonthThai(ym) {
  // ym = "YYYY-MM"
  const [y,m] = ym.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${months[parseInt(m)-1]} ${parseInt(y)+543}`;
}
function fmtDayThai(ymd) {
  const [y,m,d] = ymd.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${parseInt(y)+543}`;
}

function renderProfit() {
  const el = document.getElementById('tab-profit');
  if(!el) return;

  // Build map: dateKey -> {revenue, cost, count}
  const map = {};
  historyData.forEach(x => {
    if(!x.ts) return;
    const dk = getTsDateKey(x.ts, profitView);
    if(!map[dk]) map[dk] = {revenue:0, cost:0, count:0};
    map[dk].revenue += (x.price||0);
    map[dk].cost    += (x.cost||0);
    map[dk].count   += 1;
  });
  const keys = Object.keys(map).sort((a,b)=>b.localeCompare(a));

  // Today / this month key
  const nowKey = getTsDateKey(Date.now(), profitView);
  const todayData = map[nowKey] || {revenue:0, cost:0, count:0};
  const todayProfit = todayData.revenue - todayData.cost;

  el.innerHTML = `
    <div class="form-card" style="margin-bottom:14px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
        <div class="tab-toggle" style="margin-bottom:0">
          <button class="ttbtn${profitView==='daily'?' on':''}" onclick="setProfitView('daily')">รายวัน</button>
          <button class="ttbtn${profitView==='monthly'?' on':''}" onclick="setProfitView('monthly')">รายเดือน</button>
        </div>
      </div>
      <div class="stats" style="margin-bottom:0">
        <div class="stat">
          <div class="lbl">${profitView==='daily'?'วันนี้':'เดือนนี้'} — รายรับ</div>
          <div class="val val-blue">฿${todayData.revenue.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="lbl">${profitView==='daily'?'วันนี้':'เดือนนี้'} — ต้นทุน</div>
          <div class="val val-amber">฿${todayData.cost.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="lbl">${profitView==='daily'?'วันนี้':'เดือนนี้'} — กำไร</div>
          <div class="val ${todayProfit>=0?'val-green':'val-red'}">฿${todayProfit.toLocaleString()}</div>
        </div>
        <div class="stat">
          <div class="lbl">${profitView==='daily'?'วันนี้':'เดือนนี้'} — จำนวน</div>
          <div class="val val-gray">${todayData.count} ไอดี</div>
        </div>
      </div>
    </div>
    <div class="form-card">
      <div class="form-title" style="font-size:14px;margin-bottom:12px">ย้อนหลัง</div>
      ${!keys.length ? '<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><p>ยังไม่มีประวัติการขาย</p></div>' :
        keys.map(k=>{
          const d = map[k];
          const profit = d.revenue - d.cost;
          const label = profitView==='monthly' ? fmtMonthThai(k) : fmtDayThai(k);
          const isToday = k===nowKey;
          return `
          <div class="profit-row${isToday?' profit-today':''}">
            <div class="profit-date">${label}${isToday?` <span class="today-badge">วันนี้</span>`:''}</div>
            <div class="profit-cols">
              <div class="profit-col"><div class="profit-lbl">รายรับ</div><div class="profit-val blue">฿${d.revenue.toLocaleString()}</div></div>
              <div class="profit-col"><div class="profit-lbl">ต้นทุน</div><div class="profit-val amber">฿${d.cost.toLocaleString()}</div></div>
              <div class="profit-col"><div class="profit-lbl">กำไร</div><div class="profit-val ${profit>=0?'green':'red'}">฿${profit.toLocaleString()}</div></div>
              <div class="profit-col"><div class="profit-lbl">จำนวน</div><div class="profit-val gray">${d.count} ไอดี</div></div>
            </div>
          </div>`;
        }).join('')
      }
    </div>`;
}

window.setProfitView = function(v) {
  profitView = v;
  renderProfit();
};

// ── FIREBASE ──
function initFirebase(cfg) {
  const app = initializeApp(cfg);
  db = getDatabase(app);
  onValue(ref(db,'ids'), snap => {
    ids = snap.val() ? Object.values(snap.val()) : [];
    renderStats(); renderFilters(); renderToolbar(); renderList();
    setSyncStatus('','ซิงค์แล้ว ✓');
  }, ()=>setSyncStatus('err','เชื่อมต่อไม่ได้'));
  onValue(ref(db,'history'), snap => {
    historyData = snap.val() ? Object.values(snap.val()).sort((a,b)=>b.ts-a.ts) : [];
    if(currentTab==='history') renderHistory();
    if(currentTab==='profit')  renderProfit();
  });
  onValue(ref(db,'costs'), snap => {
    costsData = snap.val() || {};
    if(currentTab==='cost')   renderCost();
    if(currentTab==='profit') renderProfit();
  });
}

// ── BOOT ──
renderApp();
initFirebase(FIREBASE_CONFIG);
</script>
